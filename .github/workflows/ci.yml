name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: build-${{ matrix.os }}-${{ matrix.runtime }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node-version: ["20"]
        python-version: ["3.11"]
        runtime: ["typescript"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: matrix.runtime == 'node' || matrix.runtime == 'typescript' || matrix.runtime == 'javascript'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Setup Python
        if: matrix.runtime == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: npm ci --silent || npm install --silent

      - name: Build
        run: npm run build --silent

      - name: Test
        run: npm test --silent --if-present
