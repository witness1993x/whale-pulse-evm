# Auto-generated by monitoring_setup.seed_credits_check_workflow.
# Daily ChainStream GraphQL liveness probe. Fails the job (and notifies
# repo admins via GitHub's normal workflow-failure email) when the
# endpoint is unreachable, the API key is invalid, or the GraphQL schema
# response is unexpected.
#
# Why a liveness probe and not a balance check: ChainStream's GraphQL
# API exposes per-query credit cost via response.extensions.credits but
# does not expose account-level remaining balance. A daily liveness
# probe still catches the realistic ops failures (rotated key, endpoint
# rename, account suspension) without pretending to do balance alerting.
name: chainstream-credits

on:
  schedule:
    # 09:00 UTC daily.
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  check-credits:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      CHAINSTREAM_API_KEY: ${{ secrets.CHAINSTREAM_API_KEY }}
      CHAINSTREAM_GRAPHQL_ENDPOINT: "https://graphql.chainstream.io/graphql"
    steps:
      - name: Probe ChainStream GraphQL liveness
        run: |
          set -euo pipefail
          if [ -z "${CHAINSTREAM_API_KEY:-}" ]; then
            echo "::error::CHAINSTREAM_API_KEY secret is not configured"
            exit 1
          fi
          response=$(curl -fsS \
            -X POST \
            -H "X-API-KEY: ${CHAINSTREAM_API_KEY}" \
            -H "Content-Type: application/json" \
            -H "User-Agent: agentflow-credits-monitor/0.1" \
            -d '{"query":"{ __schema { queryType { name } } }"}' \
            "${CHAINSTREAM_GRAPHQL_ENDPOINT}")
          echo "response: ${response}"
          query_type=$(printf '%s' "${response}" | python3 -c \
            'import json,sys; d=json.load(sys.stdin); print(d.get("data",{}).get("__schema",{}).get("queryType",{}).get("name",""))')
          if [ "${query_type}" != "Query" ]; then
            echo "::error::ChainStream GraphQL liveness probe failed: queryType='${query_type}'"
            exit 1
          fi
          echo "ChainStream GraphQL liveness OK (queryType=${query_type})"
